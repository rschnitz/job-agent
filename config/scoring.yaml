    - netflix
    - scale ai
    - cohere

  tier3:
    - okta
    - hubspot
    - twilio
    - crowdstrike
    - palo alto networks
    - zscaler
    - datadog
    - mongodb
    - elastic
    - everlaw
    - brex
    - chime
    - adobe
    - salesforce
    - google
    - microsoft
    - amazon
    - meta
    - apple

# Location scoring
location:
  "san francisco": 10
  "oakland": 10
  "piedmont": 10
  "berkeley": 10
  "emeryville": 10
  "remote": 10
  "hybrid": 5
  "south bay": -5
  "san jose": -5
  "sunnyvale": -5
  "mountain view": -5
  "palo alto": -5
  "menlo park": -5
  "redwood city": -3
  "cupertino": -5
  # Anything not listed: 0

# Keyword bonuses (found in title or description)
keyword_bonuses:
  "authentication": 5
  "identity": 5
  "fraud": 5
  "platform": 3
  "api": 3
  "microservices": 3
  "cloud-native": 3
  "spring boot": 3
  "fintech": 5

# Keyword penalties
keyword_penalties:
  "data engineer": -15
  "machine learning engineer": -10
  "hardware": -10
  "embedded": -10
  "firmware": -10
  "mechanical": -15
  "civil": -15
  "nurse": -20
  "physician": -20

# Threshold for engaging Claude (start low, tighten over time)
# Jobs scoring below this are rejected by code alone.
# Jobs scoring at or above are sent to Claude for final judgment.
claude_threshold: 15

# Minimum score to alert (after both code + Claude scoring)
alert_threshold: 40
